name: 9RT + OPPO BPF + FUSE_BPF

on:
  workflow_dispatch:

jobs:
  build-kernel:
    name: 9RT + OPPO BPF - ${{ matrix.author }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - repo: "https://github.com/JackA1ltman/android_kernel_oneplus_sm8350.git"
            modules_repo: "https://github.com/JackA1ltman/android_kernel_modules_and_devicetree_oneplus_sm8350.git"
            oppo_repo: "https://github.com/JackA1ltman/android_kernel_oppo_sm8350.git"
            command: "LLVM=1 LLVM_IAS=1"
            branch: "oneplus/sm8350_b_16.0.0_oneplus9rt"
            modules_branch: "oneplus/sm8350_b_16.0.0_oneplus9rt"
            oppo_branch: "oneplus/sm8350v_15.0.0_oneplus9pro"
            name: "9rt-oppo-bpf"
            author: "one899"
            device: "oneplus9rt-oppo-bpf"
            defconfig: "9rt_defconfig"
            device_codename: "martini"
      fail-fast: false
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove useless tools
        run: |
          sudo rm -rf /opt/hostedtoolcache
          df -h

      - name: Install necessary packages
        run: |
          sudo apt update
          sudo apt install git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler cpio coccinelle -y
          sudo apt-get install zstd libc6 binutils libc6-dev-i386 gcc g++ p7zip p7zip-full -y
          curl -C - --progress-bar -L http://launchpadlibrarian.net/580830584/libtinfo5_6.3-2_amd64.deb -o libtinfo5.deb
          sudo apt install ./libtinfo5.deb
          rm -f libtinfo5.deb
          sudo apt install python3 -y
          sudo rm -rf /usr/bin/python
          sudo ln -s /usr/bin/python3 /usr/bin/python

      - name: Get build tools
        run: |
          cd $GITHUB_WORKSPACE
          git clone "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9.git" -b "android12L-release" gcc-64 --depth=1
          git clone "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9.git" -b "android12L-release" gcc-32 --depth=1
          git clone "https://github.com/prorooter007/android_prebuilts_clang_host_linux-x86_clang-6877366.git" -b "11.0" "clang-custom" --depth 1

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: build-kernel
          max-size: 2G

      - name: Get sources
        run: |
          cd $GITHUB_WORKSPACE
          git clone -b "${{ matrix.branch }}" "${{ matrix.repo }}" kernel/msm-5.4 --depth 1
          git clone -b "${{ matrix.modules_branch }}" "${{ matrix.modules_repo }}" modules --depth 1
          mv modules/vendor ./ && rm -rf modules
          git clone -b "${{ matrix.oppo_branch }}" "${{ matrix.oppo_repo }}" oppo_src --depth 1

      - name: Merge OPPO BPF into 9RT
        run: |
          cd $GITHUB_WORKSPACE
          OP=kernel/msm-5.4
          OPP=oppo_src

          # === kernel/bpf/ 完整替换 ===
          rm -rf $OP/kernel/bpf
          cp -r $OPP/kernel/bpf $OP/kernel/bpf

          # === BPF 核心头文件替换 ===
          cp $OPP/include/linux/bpf.h $OP/include/linux/bpf.h
          cp $OPP/include/uapi/linux/bpf.h $OP/include/uapi/linux/bpf.h
          cp $OPP/include/linux/btf.h $OP/include/linux/btf.h
          cp $OPP/include/uapi/linux/btf.h $OP/include/uapi/linux/btf.h
          cp $OPP/include/linux/filter.h $OP/include/linux/filter.h
          cp $OPP/include/linux/bpf_types.h $OP/include/linux/bpf_types.h
          cp $OPP/include/linux/tnum.h $OP/include/linux/tnum.h

          # === BPF 辅助头文件替换 ===
          cp $OPP/include/linux/bpf-cgroup.h $OP/include/linux/bpf-cgroup.h
          cp $OPP/include/linux/bpf_verifier.h $OP/include/linux/bpf_verifier.h

          # === 新增头文件 ===
          cp $OPP/include/linux/bpf_compat54.h $OP/include/linux/bpf_compat54.h
          cp $OPP/include/linux/bpf_lsm.h $OP/include/linux/bpf_lsm.h 2>/dev/null || true
          cp $OPP/include/linux/bpf-netns.h $OP/include/linux/bpf-netns.h 2>/dev/null || true
          cp $OPP/include/linux/btf_ids.h $OP/include/linux/btf_ids.h 2>/dev/null || true
          cp $OPP/include/linux/sockptr.h $OP/include/linux/sockptr.h 2>/dev/null || true
          cp $OPP/include/linux/rcupdate_trace.h $OP/include/linux/rcupdate_trace.h 2>/dev/null || true
          cp $OPP/include/linux/bpf_local_storage.h $OP/include/linux/bpf_local_storage.h 2>/dev/null || true

          # === net namespace ===
          mkdir -p $OP/include/net/netns
          cp $OPP/include/net/netns/bpf.h $OP/include/net/netns/bpf.h 2>/dev/null || true

          # === kernel/trace ===
          cp $OPP/kernel/trace/bpf_trace.c $OP/kernel/trace/bpf_trace.c 2>/dev/null || true
          cp $OPP/kernel/trace/bpf_trace.h $OP/kernel/trace/bpf_trace.h 2>/dev/null || true

          # === FUSE_BPF ===
          echo "" >> $OP/arch/arm64/configs/${{ matrix.defconfig }}
          echo "CONFIG_FUSE_BPF=y" >> $OP/arch/arm64/configs/${{ matrix.defconfig }}

          # === Clean up ===
          rm -rf oppo_src

          # === Patch 9RT headers with missing functions from OPPO ===
          # cgroup_id: static inline in cgroup.h
          sed -i '/^static inline u64 css_id/i\static inline u64 cgroup_id(struct cgroup *cgrp)\n{\n\treturn cgrp->kn->id.id;\n}\n' \
              $OP/include/linux/cgroup.h 2>/dev/null || true

          # ns_match: extern bool in proc_ns.h
          sed -i '/^extern bool proc_ns_common/i\extern bool ns_match(const struct ns_common *ns, dev_t dev, ino_t ino);\n' \
              $OP/include/linux/proc_ns.h 2>/dev/null || true

      - name: Get Packing Tools
        run: |
          cd $GITHUB_WORKSPACE/kernel/msm-5.4
          git clone "https://github.com/osm0sis/AnyKernel3.git" -b "master" Anykernel3 --depth=1

      - name: Build Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel/msm-5.4
          export PATH=$GITHUB_WORKSPACE/clang-custom/bin:$PATH

          make CC="ccache clang" O=out ARCH=arm64 CLANG_TRIPLE=aarch64-linux-gnu- \
              BRAND_SHOW_FLAG=oneplus ${{ matrix.command }} \
              CROSS_COMPILE=$GITHUB_WORKSPACE/gcc-64/bin/aarch64-linux-android- \
              CROSS_COMPILE_ARM32=$GITHUB_WORKSPACE/gcc-32/bin/arm-linux-androideabi- \
              ${{ matrix.defconfig }}

          make -j2 CC="ccache clang" CLANG_TRIPLE=aarch64-linux-gnu- \
              BRAND_SHOW_FLAG=oneplus ${{ matrix.command }} STRIP=llvm-strip \
              CROSS_COMPILE=$GITHUB_WORKSPACE/gcc-64/bin/aarch64-linux-android- \
              CROSS_COMPILE_ARM32=$GITHUB_WORKSPACE/gcc-32/bin/arm-linux-androideabi- \
              O=out ARCH=arm64

          cat out/arch/arm64/boot/dts/vendor/oplus/${{ matrix.device_codename }}/*.dtb > \
              out/arch/arm64/boot/dts/vendor/oplus/${{ matrix.device_codename }}/dtb

      - name: Make Anykernel3 - Prefix
        run: |
          cd $GITHUB_WORKSPACE/kernel/msm-5.4
          sed -i 's/ExampleKernel by osm0sis @ xda-developers/9RT + OPPO BPF Kernel by one899/g' Anykernel3/anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' Anykernel3/anykernel.sh
          sed -i 's!BLOCK=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;!BLOCK=auto;!g' Anykernel3/anykernel.sh
          sed -i 's/IS_SLOT_DEVICE=0;/is_slot_device=auto;/g' Anykernel3/anykernel.sh

      - name: Make Anykernel3 Flasher - NoDTB
        run: |
          TIME=$(date +"%Y%m%d%H%M%S")
          cd $GITHUB_WORKSPACE/kernel/msm-5.4
          mkdir -p tmp
          cp -fp out/arch/arm64/boot/Image tmp
          cp -rp ./Anykernel3/* tmp
          cd tmp && 7za a -mx9 tmp.zip * && cd ..
          cp -fp tmp/tmp.zip ${{ matrix.device }}-${{ matrix.author }}-${{ matrix.name }}-$TIME.zip
          rm -rf tmp
          echo "PACK_NAME=${{ matrix.device }}-${{ matrix.author }}-${{ matrix.name }}-$TIME.zip" >> $GITHUB_ENV

      - name: Make Anykernel3 Flasher - DTB
        run: |
          TIME=$(date +"%Y%m%d%H%M%S")
          cd $GITHUB_WORKSPACE/kernel/msm-5.4
          mkdir -p tmp
          cp -fp out/arch/arm64/boot/Image tmp
          cp -fp out/arch/arm64/boot/dts/vendor/oplus/${{ matrix.device_codename }}/dtb tmp
          cp -fp out/arch/arm64/boot/dts/vendor/oplus/${{ matrix.device_codename }}/dtbo.img tmp 2>/dev/null || true
          cp -rp ./Anykernel3/* tmp
          cd tmp && 7za a -mx9 tmp.zip * && cd ..
          cp -fp tmp/tmp.zip ${{ matrix.device }}-${{ matrix.author }}-${{ matrix.name }}-$TIME-DTB.zip
          rm -rf tmp
          echo "PACK_NAME_DTB=${{ matrix.device }}-${{ matrix.author }}-${{ matrix.name }}-$TIME-DTB.zip" >> $GITHUB_ENV

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-${{ matrix.device }}-${{ matrix.author }}-${{ matrix.name }}
          path: |
            kernel/msm-5.4/${{ env.PACK_NAME }}
            kernel/msm-5.4/${{ env.PACK_NAME_DTB }}
