name: PixelOS Base + OnePlus Modules - SM8350

on:
  workflow_dispatch:

jobs:
  build-kernel:
    name: Oneplus 9RT - PixelOS BPF - ${{ matrix.author }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - repo: "https://github.com/PixelOS-Devices/android_kernel_oneplus_sm8350.git"
            modules_repo: "https://github.com/JackA1ltman/android_kernel_modules_and_devicetree_oneplus_sm8350.git"
            oneplus_repo: "https://github.com/JackA1ltman/android_kernel_oneplus_sm8350.git"
            command: "LLVM=1 LLVM_IAS=1"
            branch: "sixteen-qpr2"
            modules_branch: "oneplus/sm8350_b_16.0.0_oneplus9rt"
            oneplus_branch: "oneplus/sm8350_b_16.0.0_oneplus9rt"
            name: "pixelos-bpf"
            author: "one899"
            device: "oneplus9rt-coloros16"
            defconfig: "9rt_defconfig"
            device_codename: "martini"
      fail-fast: false
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove useless tools
        run: |
          sudo rm -rf /opt/hostedtoolcache
          df -h

      - name: Install necessary packages
        run: |
          sudo apt update
          sudo apt install git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler cpio coccinelle -y
          sudo apt-get install zstd libc6 binutils libc6-dev-i386 gcc g++ p7zip p7zip-full -y

          # Install Libtinfo5
          curl -C - --progress-bar -L http://launchpadlibrarian.net/580830584/libtinfo5_6.3-2_amd64.deb -o libtinfo5.deb
          sudo apt install ./libtinfo5.deb
          rm -f libtinfo5.deb

          sudo apt install python3 -y
          sudo rm -rf /usr/bin/python
          sudo ln -s /usr/bin/python3 /usr/bin/python

      - name: Get build tools
        run: |
          cd $GITHUB_WORKSPACE

          git clone "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9.git" -b "android12L-release" gcc-64 --depth=1
          git clone "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9.git" -b "android12L-release" gcc-32 --depth=1

          git clone "https://github.com/prorooter007/android_prebuilts_clang_host_linux-x86_clang-6877366.git" -b "11.0" "clang-custom" --depth 1

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: build-kernel
          max-size: 2G

      - name: Get Kernel (PixelOS) + OnePlus modules + OnePlus source for defconfig
        run: |
          cd $GITHUB_WORKSPACE

          # Clone PixelOS kernel (base)
          git clone -b "${{ matrix.branch }}" "${{ matrix.repo }}" kernel/msm-5.4 --depth 1

          # Clone OnePlus modules (vendor)
          git clone -b "${{ matrix.modules_branch }}" "${{ matrix.modules_repo }}" modules --depth 1
          mv modules/vendor ./
          rm -rf modules

          # Clone OnePlus source (for defconfig + sched_assist)
          git clone -b "${{ matrix.oneplus_branch }}" "${{ matrix.oneplus_repo }}" oneplus_src --depth 1

          # Copy 9rt_defconfig from OnePlus to PixelOS
          cp oneplus_src/arch/arm64/configs/${{ matrix.defconfig }} \
             kernel/msm-5.4/arch/arm64/configs/${{ matrix.defconfig }}

          # Copy sched_assist (symlink from OnePlus vendor)
          rm -f kernel/msm-5.4/kernel/sched_assist
          ln -s ../../vendor/oplus/kernel/oplus_performance/sched_assist \
                kernel/msm-5.4/kernel/sched_assist

          # Clean up OnePlus source (we only needed defconfig + sched_assist)
          rm -rf oneplus_src

          # Add FUSE_BPF to defconfig
          echo "" >> kernel/msm-5.4/arch/arm64/configs/${{ matrix.defconfig }}
          echo "CONFIG_FUSE_BPF=y" >> kernel/msm-5.4/arch/arm64/configs/${{ matrix.defconfig }}

          # Apply KernelSU
          cd kernel/msm-5.4
          curl -LSs "https://raw.githubusercontent.com/backslashxx/KernelSU/refs/heads/master/kernel/setup.sh" | bash -s master
          echo "CONFIG_KSU=y" >> ./arch/arm64/configs/${{ matrix.defconfig }}
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> ./arch/arm64/configs/${{ matrix.defconfig }}
          curl -LSs "https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/refs/heads/mainline/Patches/syscall_hook_patches.sh" | bash -s

      - name: Get Packing Tools
        run: |
          cd $GITHUB_WORKSPACE/kernel/msm-5.4
          git clone "https://github.com/osm0sis/AnyKernel3.git" -b "master" Anykernel3 --depth=1

      - name: Build Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel/msm-5.4

          export PATH=$GITHUB_WORKSPACE/clang-custom/bin:$PATH

          make CC="ccache clang" O=out ARCH=arm64 CLANG_TRIPLE=aarch64-linux-gnu- BRAND_SHOW_FLAG=oneplus ${{ matrix.command }} CROSS_COMPILE=$GITHUB_WORKSPACE/gcc-64/bin/aarch64-linux-android- CROSS_COMPILE_ARM32=$GITHUB_WORKSPACE/gcc-32/bin/arm-linux-androideabi- ${{ matrix.defconfig }}
          make -j$(nproc --all) CC="ccache clang" CLANG_TRIPLE=aarch64-linux-gnu- BRAND_SHOW_FLAG=oneplus ${{ matrix.command }} STRIP=llvm-strip CROSS_COMPILE=$GITHUB_WORKSPACE/gcc-64/bin/aarch64-linux-android- CROSS_COMPILE_ARM32=$GITHUB_WORKSPACE/gcc-32/bin/arm-linux-androideabi- O=out ARCH=arm64 2>&1|tee error.log

          cat $GITHUB_WORKSPACE/kernel/msm-5.4/out/arch/arm64/boot/dts/vendor/oplus/${{ matrix.device_codename }}/*.dtb > $GITHUB_WORKSPACE/kernel/msm-5.4/out/arch/arm64/boot/dts/vendor/oplus/${{ matrix.device_codename }}/dtb

      - name: Make Anykernel3 - Prefix
        run: |
          cd $GITHUB_WORKSPACE/kernel/msm-5.4

          sed -i 's/ExampleKernel by osm0sis @ xda-developers/PixelOS BPF Kernel Build by one899 @ Github/g' Anykernel3/anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' Anykernel3/anykernel.sh
          sed -i 's!BLOCK=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;!BLOCK=auto;!g' Anykernel3/anykernel.sh
          sed -i 's/IS_SLOT_DEVICE=0;/is_slot_device=auto;/g' Anykernel3/anykernel.sh

      - name: Make Anykernel3 Flasher - NoDTB
        run: |
          TIME=$(date +"%Y%m%d%H%M%S")

          cd $GITHUB_WORKSPACE/kernel/msm-5.4
          mkdir -p tmp

          cp -fp $GITHUB_WORKSPACE/kernel/msm-5.4/out/arch/arm64/boot/Image tmp

          cp -rp ./Anykernel3/* tmp
          cd tmp
          7za a -mx9 tmp.zip *
          cd ..
          cp -fp tmp/tmp.zip ${{ matrix.device }}-${{ matrix.author }}-${{ matrix.name }}-$TIME.zip
          rm -rf tmp

          echo "PACK_NAME=${{ matrix.device }}-${{ matrix.author }}-${{ matrix.name }}-$TIME.zip" >> $GITHUB_ENV

      - name: Make Anykernel3 Flasher - DTB
        run: |
          TIME=$(date +"%Y%m%d%H%M%S")

          cd $GITHUB_WORKSPACE/kernel/msm-5.4
          mkdir -p tmp

          cp -fp $GITHUB_WORKSPACE/kernel/msm-5.4/out/arch/arm64/boot/Image tmp
          cp -fp $GITHUB_WORKSPACE/kernel/msm-5.4/out/arch/arm64/boot/dts/vendor/oplus/${{ matrix.device_codename }}/dtb tmp
          cp -fp $GITHUB_WORKSPACE/kernel/msm-5.4/out/arch/arm64/boot/dts/vendor/oplus/${{ matrix.device_codename }}/dtbo.img tmp

          cp -rp ./Anykernel3/* tmp
          cd tmp
          7za a -mx9 tmp.zip *
          cd ..
          cp -fp tmp/tmp.zip ${{ matrix.device }}-${{ matrix.author }}-${{ matrix.name }}-$TIME-DTB.zip
          rm -rf tmp

          echo "PACK_NAME_DTB=${{ matrix.device }}-${{ matrix.author }}-${{ matrix.name }}-$TIME-DTB.zip" >> $GITHUB_ENV

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-${{ matrix.device }}-${{ matrix.author }}-${{ matrix.name }}
          path: |
            kernel/msm-5.4/${{ env.PACK_NAME }}
            kernel/msm-5.4/${{ env.PACK_NAME_DTB }}
